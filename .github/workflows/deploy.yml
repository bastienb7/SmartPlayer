name: Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 66.42.54.223
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/smartplayer/repo
            git pull origin main
            cd apps/web
            npx next build
            # Restart frontend
            fuser -k 3015/tcp 2>/dev/null || true
            sleep 2
            nohup npx next start -p 3015 > /tmp/smartplayer-web.log 2>&1 &
            sleep 3
            curl -s -o /dev/null -w '%{http_code}' http://localhost:3015/dashboard && echo ' Frontend OK' || echo ' Frontend FAILED'
